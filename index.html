<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHYSIOWEAR Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Fondo principal azul muy oscuro */
        body { 
            background-color: #00050a; 
            color: #e0e0e0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        
        /* Paneles con el mismo color de fondo para integración */
        .panel { background-color: #00050a; border-radius: 12px; padding: 15px; border: 1px solid #002244; }
        h2 { font-size: 14px; text-align: center; margin: 0 0 10px 0; color: #888; border-bottom: 1px solid #002244; padding-bottom: 5px; }
        
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #btnConnect { background-color: #004080; color: white; } 
        #btnDisconnect { background-color: #5a1a1a; color: white; }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .metric { text-align: center; padding: 10px; background: #00050a; border-radius: 8px; border: 1px solid #002244; }
        .metric-title { font-size: 8px; font-weight: bold; color: #666; text-transform: uppercase; }
        .metric-value { font-size: 16px; font-weight: bold; margin-top: 5px; color: #fff; }
        
        .chart-wrapper { background: #00050a; padding: 8px; border-radius: 8px; border: 1px solid #002244; margin-bottom: 10px; }
        .chart-container { height: 80px; width: 100%; position: relative; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>CONTROL BLUETOOTH</h2>
        <button id="btnConnect">CONECTAR</button>
        <button id="btnDisconnect" disabled>DESCONECTAR</button>
    </div>

    <div class="metrics-grid">
        <div class="metric"><div class="metric-title">HR (BPM)</div><div class="metric-value" id="valHR">--</div></div>
        <div class="metric"><div class="metric-title">SpO2 (%)</div><div class="metric-value" id="valSpO2">--</div></div>
        <div class="metric"><div class="metric-title">RR (RPM)</div><div class="metric-value" id="valRR">--</div></div>
    </div>

    <div class="panel">
        <h2>SEÑALES EN TIEMPO REAL</h2>
        <div class="chart-wrapper">
            <div class="metric-title" style="color:#666;">RESPIRACIÓN (PT)</div>
            <div class="chart-container"><canvas id="ptChart"></canvas></div>
        </div>
        <div class="chart-wrapper">
            <div class="metric-title" style="color:#666;">FOTOPLETISMOGRAFÍA (PPG)</div>
            <div class="chart-container"><canvas id="ppgChart"></canvas></div>
        </div>
        <div class="chart-wrapper">
            <div class="metric-title" style="color:#666;">ELECTROCARDIOGRAMA (ECG)</div>
            <div class="chart-container"><canvas id="ecgChart"></canvas></div>
        </div>
    </div>

    <script>
        const createChart = (id, color) => new Chart(document.getElementById(id), {
            type: 'line',
            data: { labels: Array(50).fill(''), datasets: [{ data: Array(50).fill(0), borderColor: color, borderWidth: 1.5, pointRadius: 0, tension: 0.4 }] },
            options: { 
                responsive: true, maintainAspectRatio: false, animation: false, 
                scales: { x: { display: false }, y: { grid: { color: '#002244' }, ticks: { display: false } } }, 
                plugins: { legend: { display: false } } 
            }
        });

        const ptChart = createChart('ptChart', '#ff9900');
        const ppgChart = createChart('ppgChart', '#008000');
        const ecgChart = createChart('ecgChart', '#ff0000');

        document.getElementById('btnConnect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                await char.startNotifications();
                
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const d = new TextDecoder().decode(e.target.value).split(',');
                    if (d.length >= 5) {
                        [ecgChart, ppgChart, ptChart].forEach((c, i) => {
                            c.data.datasets[0].data.push(parseFloat(d[i]));
                            c.data.datasets[0].data.shift();
                            c.update();
                        });
                        document.getElementById('valHR').innerText = d[3];
                        document.getElementById('valSpO2').innerText = d[2];
                        document.getElementById('valRR').innerText = d[4];
                    }
                });
                document.getElementById('btnConnect').disabled = true;
                document.getElementById('btnDisconnect').disabled = false;
            } catch (err) { alert("Error: " + err); }
        });

        document.getElementById('btnDisconnect').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
