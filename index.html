<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHYSIOWEAR App</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
        }
        h2 { font-size: 18px; margin: 10px 0; color: #ccc; }
        
        .chart-container { height: 140px; width: 100%; margin-bottom: 20px; }
        
        .metrics-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            text-align: center;
        }
        .metric-box { background: #1a1a1a; padding: 15px; border-radius: 12px; }
        .val { font-size: 22px; font-weight: bold; color: #fff; }
        .label { font-size: 10px; color: #888; margin-top: 5px; }

        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; margin-bottom: 10px; }
        #btnConnect { background: #007bff; color: white; }
        #btnDisconnect { background: #444; color: white; }
    </style>
</head>
<body>

    <button id="btnConnect">CONECTAR DISPOSITIVO</button>
    <button id="btnDisconnect" disabled>DESCONECTAR</button>

    <h2>Frecuencia Cardíaca (LPM)</h2>
    <div class="chart-container"><canvas id="ecgChart"></canvas></div>

    <h2>Oximetría (%)</h2>
    <div class="chart-container"><canvas id="ppgChart"></canvas></div>

    <h2>Frecuencia Respiratoria</h2>
    <div class="chart-container"><canvas id="ptChart"></canvas></div>

    <div class="metrics-section">
        <div class="metric-box">
            <div class="val" id="valHR">--</div>
            <div class="label">BPM</div>
        </div>
        <div class="metric-box">
            <div class="val" id="valSpO2">--</div>
            <div class="label">% SpO2</div>
        </div>
        <div class="metric-box">
            <div class="val" id="valRR">--</div>
            <div class="label">RPM</div>
        </div>
    </div>

    <script>
        // Configuración de Gráficas oscuras
        const createChart = (id, color) => new Chart(document.getElementById(id), {
            type: 'line',
            data: { labels: Array(50).fill(''), datasets: [{ data: Array(50).fill(0), borderColor: color, borderWidth: 2, pointRadius: 0, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: {display: false}, y: {display: false} }, plugins: { legend: {display: false} } }
        });

        const ecgChart = createChart('ecgChart', '#ff4444');
        const ppgChart = createChart('ppgChart', '#00bfff');
        const ptChart = createChart('ptChart', '#00ff7f');

        // Lógica de conexión (mantiene tu lógica anterior)
        // ... (Aquí iría la función handleNotifications para actualizar los valores ID)
        function updateUI(hr, spo2, rr) {
            document.getElementById('valHR').innerText = hr;
            document.getElementById('valSpO2').innerText = spo2;
            document.getElementById('valRR').innerText = rr;
        }
    </script>
</body>
</html>
