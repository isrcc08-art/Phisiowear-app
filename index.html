<script>
    // 1. Configuración de Gráficas (Mismo que antes)
    const createChart = (id, color) => new Chart(document.getElementById(id), {
        type: 'line',
        data: { labels: Array(50).fill(''), datasets: [{ data: Array(50).fill(0), borderColor: color, borderWidth: 2, pointRadius: 0, tension: 0.4 }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: {display: false}, y: {display: false} }, plugins: { legend: {display: false} } }
    });

    const ecgChart = createChart('ecgChart', '#ff4444');
    const ppgChart = createChart('ppgChart', '#00bfff');
    const ptChart = createChart('ptChart', '#00ff7f');

    // 2. Lógica Bluetooth simplificada
    const btnConnect = document.getElementById('btnConnect');
    const btnDisconnect = document.getElementById('btnDisconnect');

    btnConnect.addEventListener('click', async () => {
        console.log("Intentando conectar...");
        try {
            // Solicitud de dispositivo
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b'] }]
            });

            console.log("Dispositivo seleccionado:", device.name);
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
            const characteristic = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
            
            await characteristic.startNotifications();
            
            characteristic.addEventListener('characteristicvaluechanged', (event) => {
                const value = new TextDecoder().decode(event.target.value);
                console.log("Datos recibidos:", value);
                const data = value.split(',');
                if (data.length >= 5) {
                    // Actualizar UI
                    document.getElementById('valHR').innerText = data[3];
                    document.getElementById('valSpO2').innerText = data[2];
                    document.getElementById('valRR').innerText = data[4];
                    // Actualizar gráficas (data[0]=ecg, data[1]=ppg, data[4]=pt)
                    // ... (lógica de updateCharts)
                }
            });

            btnConnect.disabled = true;
            btnDisconnect.disabled = false;
        } catch (error) {
            console.error("Error crítico:", error);
            alert("No se pudo conectar: " + error.message);
        }
    });
</script>
