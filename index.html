<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHYSIOWEAR Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Fondo casi negro (Azul muy oscuro #00050a) */
        body { background-color: #00050a; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* Contenedores oscuros */
        .chart-wrapper { 
            background: #000a14; 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            border: 1px solid #001f3f; 
        }
        .chart-container { height: 120px; width: 100%; position: relative; }
        
        .metrics-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .metric-box { background: #000f1f; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #00274d; }
        .val { font-size: 18px; font-weight: bold; }
        .label { font-size: 8px; color: #555; text-transform: uppercase; }
        
        button { width: 100%; padding: 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px;}
        #btnConnect { background: #004080; color: white; }
    </style>
</head>
<body>

    <button id="btnConnect">CONECTAR DISPOSITIVO</button>

    <div class="chart-wrapper"><div class="chart-container"><canvas id="ecgChart"></canvas></div></div>
    <div class="chart-wrapper"><div class="chart-container"><canvas id="ppgChart"></canvas></div></div>
    <div class="chart-wrapper"><div class="chart-container"><canvas id="ptChart"></canvas></div></div>

    <div class="metrics-section">
        <div class="metric-box"><div class="val" id="valHR">--</div><div class="label">BPM</div></div>
        <div class="metric-box"><div class="val" id="valSpO2">--</div><div class="label">% SpO2</div></div>
        <div class="metric-box"><div class="val" id="valRR">--</div><div class="label">RPM</div></div>
    </div>

    <script>
        // Configuración con cuadrícula sutil
        const createChart = (id, color) => new Chart(document.getElementById(id), {
            type: 'line',
            data: { labels: Array(50).fill(''), datasets: [{ data: Array(50).fill(0), borderColor: color, borderWidth: 2, pointRadius: 0 }] },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                scales: { 
                    x: { display: false }, 
                    y: { min: 0, max: 100, grid: { color: '#001a33' } } 
                } 
            }
        });

        const ecgChart = createChart('ecgChart', '#ff3333');
        const ppgChart = createChart('ppgChart', '#33ccff');
        const ptChart = createChart('ptChart', '#33ff99');

        document.getElementById('btnConnect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                await char.startNotifications();
                
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const d = new TextDecoder().decode(e.target.value).split(',');
                    if (d.length >= 5) {
                        [ecgChart, ppgChart, ptChart].forEach((c, i) => {
                            c.data.datasets[0].data.push(parseFloat(d[i]));
                            c.data.datasets[0].data.shift();
                            c.update();
                        });
                        document.getElementById('valHR').innerText = d[3];
                        document.getElementById('valSpO2').innerText = d[2];
                        document.getElementById('valRR').innerText = d[4];
                    }
                });
            } catch (err) { alert("Error: " + err); }
        });
    </script>
</body>
</html>
