<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHYSIOWEAR Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Fondo blanco */
        body { 
            background-color: #ffffff; 
            color: #333; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
        }
        .panel { 
            background-color: #ffffff; 
            border-radius: 12px; 
            padding: 15px; 
            border: 1px solid #eee;
        }
        h2 { 
            font-size: 14px; 
            text-align: center; 
            margin: 0 0 10px 0; 
            color: #333; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 5px; 
        }
        
        button { 
            width: 100%; 
            padding: 15px; 
            margin: 5px 0; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
        }
        #btnConnect { background-color: #007bff; color: white; } 
        #btnDisconnect { background-color: #dc3545; color: white; }
        button:disabled { opacity: 0.5; }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .metric { text-align: center; padding: 10px; background: #f8f9fa; border-radius: 8px; }
        .metric-title { font-size: 10px; font-weight: bold; color: #666; }
        .metric-value { font-size: 20px; font-weight: bold; margin-top: 5px; }
        
        /* Contenedores de gráficas más pequeños y con borde */
        .chart-wrapper {
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
            margin-bottom: 10px;
        }
        .chart-container { height: 80px; width: 100%; position: relative; }
        
        .status-container { text-align: center; margin-top: 10px; font-size: 12px; color: #666; }
        .lamp { display:inline-block; width:12px; height:12px; border-radius:50%; background:red; }
        .lamp.active { background: limegreen; box-shadow: 0 0 8px limegreen; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>CONTROL BLUETOOTH</h2>
        <button id="btnConnect">CONECTAR</button>
        <button id="btnDisconnect" disabled>DESCONECTAR</button>
        <div class="status-container">
            Estado: <div id="lamp" class="lamp"></div>
        </div>
    </div>

    <div class="metrics-grid">
        <div class="metric"><div class="metric-title">❤️ HR (BPM)</div><div class="metric-value" id="valHR">--</div></div>
        <div class="metric"><div class="metric-title">🩸 SpO2 (%)</div><div class="metric-value" id="valSpO2">--</div></div>
    </div>

    <div class="panel">
        <h2>SEÑALES EN TIEMPO REAL</h2>
        <div class="chart-wrapper">
            <div class="metric-title">RESPIRACIÓN (PT)</div>
            <div class="chart-container"><canvas id="ptChart"></canvas></div>
        </div>
        <div class="chart-wrapper">
            <div class="metric-title">FOTOPLETISMOGRAFÍA (PPG)</div>
            <div class="chart-container"><canvas id="ppgChart"></canvas></div>
        </div>
        <div class="chart-wrapper">
            <div class="metric-title">ELECTROCARDIOGRAMA (ECG)</div>
            <div class="chart-container"><canvas id="ecgChart"></canvas></div>
        </div>
    </div>

    <script>
        const maxSamples = 50; 
        const createChart = (canvasId, color) => {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: { 
                    labels: Array(maxSamples).fill(''), 
                    datasets: [{ 
                        data: Array(maxSamples).fill(0), 
                        borderColor: color, 
                        borderWidth: 1.5, 
                        pointRadius: 0, 
                        tension: 0.4 
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    animation: false, 
                    scales: { 
                        x: { display: false }, 
                        y: { 
                            display: true, 
                            grid: { color: '#eee' }, 
                            ticks: { display: false } 
                        } 
                    }, 
                    plugins: { legend: { display: false } } 
                }
            });
        };

        const ptChart = createChart('ptChart', '#ff9900');
        const ppgChart = createChart('ppgChart', '#008000');
        const ecgChart = createChart('ecgChart', '#ff0000');

        function updateCharts(ecg, ppg, pt) {
            [ecgChart, ppgChart, ptChart].forEach((chart, i) => {
                const val = [ecg, ppg, pt][i];
                chart.data.datasets[0].data.push(val);
                chart.data.datasets[0].data.shift();
                chart.update();
            });
        }

        const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
        let bluetoothDevice, bleCharacteristic;

        document.getElementById('btnConnect').addEventListener('click', async () => {
            try {
                bluetoothDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [SERVICE_UUID] });
                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                await bleCharacteristic.startNotifications();
                bleCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const data = new TextDecoder().decode(e.target.value).split(',');
                    if (data.length >= 5) {
                        updateCharts(parseFloat(data[0]), parseFloat(data[1]), parseFloat(data[4]));
                        document.getElementById('valHR').innerText = data[3];
                        document.getElementById('valSpO2').innerText = data[2];
                    }
                });
                document.getElementById('btnConnect').disabled = true;
                document.getElementById('btnDisconnect').disabled = false;
                document.getElementById('lamp').classList.add('active');
            } catch (err) { alert("Error: " + err); }
        });

        document.getElementById('btnDisconnect').addEventListener('click', () => {
            if (bluetoothDevice) bluetoothDevice.gatt.disconnect();
            document.getElementById('btnConnect').disabled = false;
            document.getElementById('btnDisconnect').disabled = true;
            document.getElementById('lamp').classList.remove('active');
        });
    </script>
</body>
</html>
