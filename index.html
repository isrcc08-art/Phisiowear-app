<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHYSIOWEAR Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #001f3f; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .chart-wrapper { background: #00274d; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #00509d; }
        .chart-container { height: 120px; width: 100%; position: relative; }
        .metrics-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .metric-box { background: #003366; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #00509d; }
        .val { font-size: 18px; font-weight: bold; }
        button { width: 100%; padding: 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        #btnConnect { background: #007bff; color: white; }
    </style>
</head>
<body>

    <button id="btnConnect">CONECTAR DISPOSITIVO</button>

    <div class="chart-wrapper"><div class="chart-container"><canvas id="ecgChart"></canvas></div></div>
    <div class="chart-wrapper"><div class="chart-container"><canvas id="ppgChart"></canvas></div></div>
    <div class="chart-wrapper"><div class="chart-container"><canvas id="ptChart"></canvas></div></div>

    <div class="metrics-section">
        <div class="metric-box"><div class="val" id="valHR">--</div><small>BPM</small></div>
        <div class="metric-box"><div class="val" id="valSpO2">--</div><small>%</small></div>
        <div class="metric-box"><div class="val" id="valRR">--</div><small>RPM</small></div>
    </div>

    <script>
        const createChart = (id, color) => new Chart(document.getElementById(id), {
            type: 'line',
            data: { labels: Array(50).fill(''), datasets: [{ data: Array(50).fill(0), borderColor: color, borderWidth: 2, pointRadius: 0 }] },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                scales: { x: { display: false }, y: { min: -100, max: 100, grid: { color: '#00509d' } } } 
            }
        });

        const ecgChart = createChart('ecgChart', '#ff4444');
        const ppgChart = createChart('ppgChart', '#00bfff');
        const ptChart = createChart('ptChart', '#00ff7f');

        document.getElementById('btnConnect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                await char.startNotifications();
                
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const raw = new TextDecoder().decode(e.target.value);
                    console.log("Raw:", raw); // <--- MIRA ESTO EN LA CONSOLA
                    const d = raw.split(',');
                    if (d.length >= 5) {
                        [ecgChart, ppgChart, ptChart].forEach((c, i) => {
                            c.data.datasets[0].data.push(parseFloat(d[i]));
                            c.data.datasets[0].data.shift();
                            c.update();
                        });
                        document.getElementById('valHR').innerText = d[3];
                        document.getElementById('valSpO2').innerText = d[2];
                        document.getElementById('valRR').innerText = d[4];
                    }
                });
            } catch (err) { alert(err); }
        });
    </script>
</body>
</html>
