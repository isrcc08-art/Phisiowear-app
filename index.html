<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHYSIOWEAR Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Fondo Gris Oscuro Profesional */
        body { background-color: #121212; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; }
        
        .chart-wrapper { 
            background: #1e1e1e; 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            border: 1px solid #333; 
        }
        .chart-container { height: 120px; width: 100%; position: relative; }
        
        .metrics-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .metric-box { background: #262626; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        .val { font-size: 18px; font-weight: bold; color: #ffffff; }
        .label { font-size: 8px; color: #888; text-transform: uppercase; margin-top: 4px; }
        
        button { width: 100%; padding: 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        #btnConnect { background: #333; color: #fff; border: 1px solid #555; }
    </style>
</head>
<body>

    <button id="btnConnect">CONECTAR DISPOSITIVO</button>

    <div class="chart-wrapper">
        <h2 style="font-size:10px; margin:0 0 5px 0; color:#aaa;">⚡ ELECTROCARDIOGRAMA (ECG)</h2>
        <div class="chart-container"><canvas id="ecgChart"></canvas></div>
    </div>
    <div class="chart-wrapper">
        <h2 style="font-size:10px; margin:0 0 5px 0; color:#aaa;">🩸 OXIMETRÍA (SpO2)</h2>
        <div class="chart-container"><canvas id="ppgChart"></canvas></div>
    </div>
    <div class="chart-wrapper">
        <h2 style="font-size:10px; margin:0 0 5px 0; color:#aaa;">🫁 RESPIRACIÓN (PT)</h2>
        <div class="chart-container"><canvas id="ptChart"></canvas></div>
    </div>

    <div class="metrics-section">
        <div class="metric-box"><div class="val" id="valHR">--</div><div class="label">BPM</div></div>
        <div class="metric-box"><div class="val" id="valSpO2">--</div><div class="label">% SpO2</div></div>
        <div class="metric-box"><div class="val" id="valRR">--</div><div class="label">RPM</div></div>
    </div>

    <script>
        // Configuración de Gráficas con cuadrícula visible
        const createChart = (id, color) => new Chart(document.getElementById(id), {
            type: 'line',
            data: { labels: Array(50).fill(''), datasets: [{ data: Array(50).fill(0), borderColor: color, borderWidth: 2, pointRadius: 0, tension: 0.4 }] },
            options: { 
                responsive: true, maintainAspectRatio: false, animation: false,
                scales: { 
                    x: { display: true, grid: { color: '#333' } }, 
                    y: { min: 0, max: 100, grid: { color: '#333' }, ticks: { color: '#888', font: { size: 9 } } } 
                },
                plugins: { legend: { display: false } }
            }
        });

        const ecgChart = createChart('ecgChart', '#ff5252');
        const ppgChart = createChart('ppgChart', '#40c4ff');
        const ptChart = createChart('ptChart', '#69f0ae');

        // Lógica de Conexión Bluetooth
        document.getElementById('btnConnect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                await char.startNotifications();
                
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const d = new TextDecoder().decode(e.target.value).split(',');
                    if (d.length >= 5) {
                        // Actualizar gráficas
                        [ecgChart, ppgChart, ptChart].forEach((c, i) => {
                            c.data.datasets[0].data.push(parseFloat(d[i]));
                            c.data.datasets[0].data.shift();
                            c.update();
                        });
                        // Actualizar métricas
                        document.getElementById('valHR').innerText = d[3];
                        document.getElementById('valSpO2').innerText = d[2];
                        document.getElementById('valRR').innerText = d[4];
                    }
                });
            } catch (err) { alert("Error de conexión: " + err); }
        });
    </script>
</body>
</html>
